name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build SwiftUI package
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: xcodebuild -version

      - name: Build app target
        run: |
          xcodebuild \
            -scheme FactCheck \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
